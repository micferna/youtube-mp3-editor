services:
  app:
    build: .
    image: youtube-mp3-editor
    container_name: youtube-mp3-editor
    ports:
      - "8000:8000"
    volumes:
      # Persist downloads, exports and project state on the host.
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
